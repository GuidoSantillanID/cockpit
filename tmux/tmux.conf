# Window/pane index starts at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# True color support for Ghostty
set -g @catppuccin_flavor 'mocha'

# Dracula palette (secondary pane theming)
set -g @dracula_bg  '#282a36'
set -g @dracula_fg  '#f8f8f2'
set -g @catppuccin_window_status_style 'none'
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Large scrollback for verbose Claude output
set -g history-limit 50000

# Visual feedback
set -g display-time 1000
set -g status on
set -g status-position top
set -g status-left ""
# Pane state badge (shown when 2+ panes exist):
#   󰕮 SIDE   — side-by-side (teal, unzoomed)
#   󰆍 TERM   — non-main pane fullscreen (peach, zoomed on pane != 1)
#   󰈉 HIDDEN — extras hidden (dim, zoomed on pane 1)
set -g status-right '#{?client_prefix,#[bg=colour1 fg=colour255 bold] PREFIX #[default] ,}#{?#{>=:#{window_panes},2},#{?#{window_zoomed_flag},#{?#{==:#{pane_index},1},#[fg=#{@thm_text}]#[bg=#{@thm_surface0}] 󰈉 HIDDEN #[default] ,#[fg=#{@thm_crust}]#[bg=#{@thm_peach}]#[bold] 󰆍 TERM #[default] },#[fg=#{@thm_teal}] 󰕮 SIDE #[default] },}#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '
set -g status-right-length 100

# Window names: show directory basename only
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}#{?#{==:#{pane_current_command},zsh},, (#{pane_current_command})}'
set -g allow-rename off

# Window status: active = peach, inactive = subtle gray
set -g window-status-current-format '#[fg=#{@thm_crust},bg=#{@thm_peach},bold] #I: #{?#{==:#{=20:window_name},#W},#W,#{=19:window_name}…}#{?@claude_done, #[fg=#{@thm_green}]●#[fg=#{@thm_crust}],} '
set -g window-status-format '#[fg=#{@thm_text},bg=#{@thm_surface0}] #I: #{?#{==:#{=20:window_name},#W},#W,#{=19:window_name}…}#{?@claude_done, #[fg=#{@thm_green}]●#[fg=#{@thm_text}],} '

# Reload config
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# New window + splits open in current path
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
# prefix+e: side-by-side toggle (uses @secondary to track active extra pane)
# - 1 pane   → split right (30%), focus new pane (instant, hook tracks @secondary)
# - 2+ panes → script handles toggle with @secondary fallback
bind e if-shell "[ #{window_panes} -eq 1 ]" \
  "split-window -h -l 30% -c '#{pane_current_path}'" \
  "run-shell 'tmux-pane-focus side'"
# prefix+t: zoomed toggle (uses @secondary to track active extra pane)
# - 1 pane   → split right (30%), zoom new pane (instant, hook tracks @secondary)
# - 2+ panes → script handles toggle with @secondary fallback
bind t if-shell "[ #{window_panes} -eq 1 ]" \
  "split-window -h -l 30% -c '#{pane_current_path}' ; resize-pane -Z" \
  "run-shell 'tmux-pane-focus zoom'"
unbind d

# Style non-primary panes (index > 1) with Dracula bg + track as @secondary
set-hook -g after-split-window \
  'if-shell "[ #{pane_index} -gt 1 ]" "set -w @secondary #{pane_id} ; select-pane -P \"bg=#{@dracula_bg},fg=#{@dracula_fg}\""'

# Track @secondary (conditional format — no shell fork) + auto-resize (2-pane, unzoomed)
set-hook -g after-select-pane \
  'set -w @secondary "#{?#{!=:#{pane_index},1},#{pane_id},#{@secondary}}" ; if-shell "[ #{window_panes} -eq 2 ] && [ #{window_zoomed_flag} -eq 0 ]" "if-shell \"[ #{pane_index} -eq 1 ]\" \"resize-pane -x 70%\" \"resize-pane -x 55%\""'

# Sessionizer
bind f display-popup -E "tmux-sessionizer"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @tmux-which-key-xdg-open 0
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-processes '~claude'
set -g @resurrect-hook-post-save 'tmux display-message "  session saved"'
set -g @resurrect-hook-post-restore 'tmux display-message "  session restored"'

# Clear claude-done indicator on window/session switch
set-hook -g after-select-window 'set-option -wu @claude_done'
set-hook -g client-session-changed 'set-option -wu @claude_done'

# fzf session switcher (v3: composite labels, working directory, blue for running)
bind s choose-tree -Zs
bind w display-popup -w 85% -h 80% -E "tmux-session-switcher"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

run '~/.tmux/plugins/tpm/tpm'

# Mode & message styling (choose-tree, copy-mode, command prompt)
# Must be after catppuccin and tpm to avoid being overridden
set -g mode-style 'bg=#6c7086 bold'
set -g message-style 'fg=#11111b bg=#94e2d5'
set -g message-command-style 'fg=#11111b bg=#94e2d5'
